#cloud-config

# OpenClaw VM Bootstrap - Ubuntu 24.04 LTS + XFCE + OpenClaw
# Uses default Azure admin user (azureuser). No custom users.
# Data disk at /dev/disk/azure/scsi1/lun0 is mounted at /data for persistence.

ssh_pwauth: true

package_update: true
package_upgrade: true

packages:
  # Desktop environment (XFCE on X11)
  - xfce4
  - xfce4-goodies
  - xfce4-terminal
  - dbus-x11
  # Remote desktop
  - xrdp
  # Virtual display + desktop automation
  - xvfb
  - x11vnc
  - tigervnc-viewer
  - xdotool
  - scrot
  - x11-utils
  - x11-xserver-utils
  # Dev tools
  - git
  - curl
  - wget
  - build-essential
  - unzip
  - jq
  # Python
  - python3
  - python3-venv
  - python3-pip
  - python3-dev
  # System libraries for GUI automation
  - libx11-dev
  - libxext-dev
  - libxtst-dev
  - libpng-dev

write_files:
  # xrdp session config - use XFCE
  - path: /etc/xrdp/startwm.sh
    permissions: "0755"
    content: |
      #!/bin/sh
      unset DBUS_SESSION_BUS_ADDRESS
      unset XDG_RUNTIME_DIR
      exec startxfce4

  # Xvfb virtual display service
  # This is Chrome's permanent home. It never dies regardless of RDP state.
  - path: /etc/systemd/system/xvfb.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Xvfb Virtual Framebuffer
      After=network.target

      [Service]
      Type=simple
      ExecStart=/usr/bin/Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

  # x11vnc mirrors Xvfb :99 so you can watch the agent's browser from RDP.
  # Open the "Agent Browser Viewer" shortcut on the desktop, or:
  #   vncviewer localhost:5999
  - path: /etc/systemd/system/x11vnc-xvfb.service
    permissions: "0644"
    content: |
      [Unit]
      Description=x11vnc mirror of Xvfb :99
      After=xvfb.service
      Requires=xvfb.service

      [Service]
      Type=simple
      ExecStart=/usr/bin/x11vnc -display :99 -rfbport 5999 -nopw -shared -forever -noxdamage -localhost
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

  # OpenClaw gateway service
  # Always uses Xvfb :99 so Chrome never crashes when RDP disconnects.
  # Watch the agent's browser: open VNC viewer to localhost:5999 from your RDP session.
  # Or ask via Telegram: the agent can take browser snapshots.
  - path: /etc/systemd/system/openclaw-gateway.service
    permissions: "0644"
    content: |
      [Unit]
      Description=OpenClaw Gateway
      After=network-online.target xvfb.service
      Wants=network-online.target xvfb.service

      [Service]
      Type=simple
      User=azureuser
      Group=azureuser
      WorkingDirectory=/home/azureuser
      Environment=HOME=/home/azureuser
      Environment=DISPLAY=:99
      EnvironmentFile=/home/azureuser/.openclaw/.env
      ExecStart=/usr/bin/openclaw gateway
      Restart=always
      RestartSec=10
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target

  # Setup script
  - path: /opt/setup-openclaw.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
      exec > /var/log/openclaw-setup.log 2>&1

      echo "=== OpenClaw Setup Starting ==="

      # Set RDP password for azureuser
      echo "azureuser:__RDP_PASSWORD__" | chpasswd

      # ---------------------------------------------------------------
      # Disable AppArmor entirely (agent must have full system control)
      # ---------------------------------------------------------------
      echo "Disabling AppArmor..."
      systemctl stop apparmor 2>/dev/null || true
      systemctl disable apparmor 2>/dev/null || true
      systemctl mask apparmor 2>/dev/null || true
      apt-get remove --purge -y apparmor apparmor-utils 2>/dev/null || true
      if ! grep -q 'apparmor=0' /etc/default/grub; then
          sed -i 's|GRUB_CMDLINE_LINUX_DEFAULT="\(.*\)"|GRUB_CMDLINE_LINUX_DEFAULT="\1 apparmor=0 security="|' /etc/default/grub
          update-grub 2>&1 | tail -3
      fi

      # ---------------------------------------------------------------
      # Disable Azure managed identity (prevent agent from touching
      # Azure control plane). The VM boundary is our security boundary.
      # ---------------------------------------------------------------
      echo "Disabling Azure IMDS access..."
      # Block the Azure Instance Metadata Service endpoint so no process
      # on this VM can acquire tokens for Azure Resource Manager.
      iptables -A OUTPUT -d 169.254.169.254 -j DROP
      # Persist the rule across reboots
      mkdir -p /etc/iptables
      iptables-save > /etc/iptables/rules.v4
      cat > /etc/systemd/system/iptables-restore.service << 'IPTEOF'
      [Unit]
      Description=Restore iptables rules
      Before=network-pre.target
      Wants=network-pre.target

      [Service]
      Type=oneshot
      ExecStart=/sbin/iptables-restore /etc/iptables/rules.v4
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
      IPTEOF
      systemctl enable iptables-restore.service

      # ---------------------------------------------------------------
      # Mount data disk
      # ---------------------------------------------------------------
      DATA_DEV="/dev/disk/azure/scsi1/lun0"
      DATA_MOUNT="/data"

      echo "Mounting data disk..."
      mkdir -p "$DATA_MOUNT"

      # Format only if no filesystem exists (fresh disk)
      if ! blkid "$DATA_DEV" &>/dev/null; then
          echo "Fresh data disk detected. Formatting..."
          mkfs.ext4 -F "$DATA_DEV"
      else
          echo "Existing data disk detected. Preserving data."
      fi

      mount "$DATA_DEV" "$DATA_MOUNT"

      # Add to fstab for persistence across reboots
      if ! grep -q "$DATA_MOUNT" /etc/fstab; then
          echo "$DATA_DEV $DATA_MOUNT ext4 defaults,nofail 0 2" >> /etc/fstab
      fi

      # ---------------------------------------------------------------
      # Initialize data disk directories (only if fresh)
      # ---------------------------------------------------------------
      if [[ ! -d "$DATA_MOUNT/openclaw" ]]; then
          echo "Initializing data disk directories..."
          mkdir -p "$DATA_MOUNT/openclaw"
          mkdir -p "$DATA_MOUNT/workspace"
      fi

      chown -R azureuser:azureuser "$DATA_MOUNT"

      # ---------------------------------------------------------------
      # Write config/env to data disk (only if not already there)
      # ---------------------------------------------------------------
      if [[ ! -f "$DATA_MOUNT/openclaw/.env" ]]; then
          cat > "$DATA_MOUNT/openclaw/.env" << 'ENVEOF'
      XAI_API_KEY=__XAI_API_KEY__
      TELEGRAM_BOT_TOKEN=__TELEGRAM_BOT_TOKEN__
      ENVEOF
          chmod 600 "$DATA_MOUNT/openclaw/.env"
      else
          echo "Existing .env found on data disk. Keeping it."
      fi

      if [[ ! -f "$DATA_MOUNT/openclaw/openclaw.json" ]]; then
          cat > "$DATA_MOUNT/openclaw/openclaw.json" << 'CFGEOF'
      {
        // --- Agent defaults ---
        "agents": {
          "defaults": {
            "model": {
              "primary": "xai/grok-4"
            },
            "workspace": "/home/azureuser/workspace",
            "maxConcurrent": 4,
            // No sandbox. The VM IS the sandbox.
            "sandbox": {
              "mode": "off"
            },
            // All sessions run elevated on host, no approval prompts.
            "elevatedDefault": "full"
          },
          "list": [
            {
              "id": "main",
              "default": true
            }
          ]
        },

        // --- Model provider ---
        "models": {
          "mode": "merge",
          "providers": {
            "xai": {
              "baseUrl": "https://api.x.ai/v1",
              "api": "openai-completions",
              "models": [
                {
                  "id": "grok-4",
                  "name": "Grok 4",
                  "reasoning": false,
                  "input": ["text"],
                  "contextWindow": 200000,
                  "maxTokens": 8192
                }
              ]
            }
          }
        },

        // --- Channels ---
        "channels": {
          "telegram": {
            "enabled": true,
            // Lock to your Telegram user ID. Replace with your actual ID.
            // Find it by messaging @userinfobot on Telegram.
            "dmPolicy": "allowlist",
            "allowFrom": ["__TELEGRAM_USER_ID__"],
            "groupPolicy": "disabled",
            "streaming": "partial"
          }
        },

        // --- Gateway ---
        "gateway": {
          "port": 18789,
          "mode": "local",
          // Loopback only - no auth needed. Only local processes can connect.
          "bind": "loopback"
        },

        // --- Tools: full autonomy ---
        "tools": {
          "exec": {
            "security": "full",
            "ask": "off",
            "backgroundMs": 10000,
            "timeoutSec": 1800
          },
          "web": {
            "search": { "enabled": true },
            "fetch": { "enabled": true }
          }
        },

        // --- Browser: headed on Xvfb :99 ---
        "browser": {
          "enabled": true,
          "executablePath": "/usr/bin/google-chrome-stable",
          "headless": false,
          "noSandbox": true
        },

        // --- Logging ---
        "logging": {
          "redactSensitive": "tools"
        }
      }
      CFGEOF
          chmod 644 "$DATA_MOUNT/openclaw/openclaw.json"
      else
          echo "Existing openclaw.json found on data disk. Keeping it."
      fi

      # ---------------------------------------------------------------
      # Exec approvals: auto-approve everything, no prompts
      # ---------------------------------------------------------------
      if [[ ! -f "$DATA_MOUNT/openclaw/exec-approvals.json" ]]; then
          cat > "$DATA_MOUNT/openclaw/exec-approvals.json" << 'APPROVEEOF'
      {
        "version": 1,
        "defaults": {
          "security": "full",
          "ask": "off",
          "askFallback": "full"
        },
        "agents": {
          "*": {
            "security": "full",
            "ask": "off",
            "askFallback": "full",
            "allowlist": [
              { "pattern": "**" }
            ]
          },
          "main": {
            "security": "full",
            "ask": "off",
            "askFallback": "full",
            "allowlist": [
              { "pattern": "**" }
            ]
          }
        }
      }
      APPROVEEOF
          chmod 644 "$DATA_MOUNT/openclaw/exec-approvals.json"
      else
          echo "Existing exec-approvals.json found on data disk. Keeping it."
      fi

      chown -R azureuser:azureuser "$DATA_MOUNT"

      # ---------------------------------------------------------------
      # Symlink data disk into home directory
      # ---------------------------------------------------------------
      echo "Linking data disk into home directory..."
      rm -rf /home/azureuser/.openclaw
      ln -s "$DATA_MOUNT/openclaw" /home/azureuser/.openclaw

      rm -rf /home/azureuser/workspace
      ln -s "$DATA_MOUNT/workspace" /home/azureuser/workspace

      chown -h azureuser:azureuser /home/azureuser/.openclaw
      chown -h azureuser:azureuser /home/azureuser/workspace

      # ---------------------------------------------------------------
      # Install software
      # ---------------------------------------------------------------

      # Node.js 24 (OpenClaw recommended)
      echo "Installing Node.js 24..."
      curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
      apt-get install -y nodejs

      # OpenClaw
      echo "Installing OpenClaw..."
      npm install -g openclaw@latest

      # pyautogui
      echo "Installing pyautogui..."
      pip3 install --break-system-packages pyautogui

      # Fix home directory ownership
      chown -R azureuser:azureuser /home/azureuser/.npm /home/azureuser/.cache 2>/dev/null || true

      # Playwright + Chromium
      echo "Installing Playwright..."
      su - azureuser -c "npx playwright install chromium --with-deps" || true

      # Google Chrome (.deb - snap chromium has AppArmor/DBus issues over xrdp)
      echo "Installing Google Chrome..."
      wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb -O /tmp/chrome.deb
      apt-get install -y /tmp/chrome.deb
      rm /tmp/chrome.deb

      # Telegram Desktop (official tarball - snap has same xrdp issues)
      echo "Installing Telegram Desktop..."
      wget -q https://telegram.org/dl/desktop/linux -O /tmp/telegram.tar.xz
      mkdir -p /opt
      tar -xJf /tmp/telegram.tar.xz -C /opt/
      rm /tmp/telegram.tar.xz
      ln -sf /opt/Telegram/Telegram /usr/local/bin/telegram-desktop

      # ---------------------------------------------------------------
      # Configure xrdp
      # ---------------------------------------------------------------
      echo "Configuring xrdp..."
      sed -i 's/^max_bpp=.*/max_bpp=24/' /etc/xrdp/xrdp.ini
      sed -i 's/^xserverbpp=.*/xserverbpp=24/' /etc/xrdp/xrdp.ini
      grep -q 'bulk_compression' /etc/xrdp/xrdp.ini || sed -i '/\[Globals\]/a bulk_compression=true' /etc/xrdp/xrdp.ini

      # Session persistence: don't kill sessions when RDP disconnects
      # (sesman.ini.d/ may not be supported on all xrdp versions, so patch directly)
      sed -i 's/^KillDisconnected=.*/KillDisconnected=false/' /etc/xrdp/sesman.ini 2>/dev/null || true
      sed -i 's/^DisconnectedTimeLimit=.*/DisconnectedTimeLimit=0/' /etc/xrdp/sesman.ini 2>/dev/null || true
      sed -i 's/^IdleTimeLimit=.*/IdleTimeLimit=0/' /etc/xrdp/sesman.ini 2>/dev/null || true

      # If the keys don't exist yet, append them to [Sessions]
      if ! grep -q 'KillDisconnected' /etc/xrdp/sesman.ini; then
          sed -i '/\[Sessions\]/a KillDisconnected=false\nDisconnectedTimeLimit=0\nIdleTimeLimit=0' /etc/xrdp/sesman.ini
      fi

      systemctl enable xrdp
      systemctl restart xrdp

      # Disable screen blanking and power management for Xvfb display
      su - azureuser -c "DISPLAY=:99 xset s off 2>/dev/null; DISPLAY=:99 xset -dpms 2>/dev/null" || true

      # Disable XFCE compositing
      su - azureuser -c "DISPLAY=:99 xfconf-query -c xfwm4 -p /general/use_compositing -s false" 2>/dev/null || true

      # ---------------------------------------------------------------
      # Desktop shortcuts
      # ---------------------------------------------------------------
      echo "Creating desktop shortcuts..."
      mkdir -p /home/azureuser/Desktop

      cat > /home/azureuser/Desktop/Chrome.desktop << 'DESK'
      [Desktop Entry]
      Type=Application
      Name=Google Chrome
      Exec=google-chrome %U
      Icon=google-chrome
      Terminal=false
      Categories=Network;WebBrowser;
      StartupNotify=true
      DESK

      cat > /home/azureuser/Desktop/Telegram.desktop << 'DESK'
      [Desktop Entry]
      Type=Application
      Name=Telegram
      Exec=/opt/Telegram/Telegram %U
      Icon=telegram
      Terminal=false
      Categories=Network;Chat;
      StartupNotify=true
      DESK

      cat > /home/azureuser/Desktop/OpenClaw-Dashboard.desktop << 'DESK'
      [Desktop Entry]
      Type=Application
      Name=OpenClaw Dashboard
      Exec=openclaw dashboard
      Icon=utilities-terminal
      Terminal=false
      Categories=Network;
      StartupNotify=true
      DESK

      cat > /home/azureuser/Desktop/Agent-Browser.desktop << 'DESK'
      [Desktop Entry]
      Type=Application
      Name=Agent Browser Viewer
      Comment=Watch the agent's Chrome browser (Xvfb :99 via VNC)
      Exec=xfce4-terminal -e 'bash -c "echo Connecting to agent browser on :99...; DISPLAY=${DISPLAY} vncviewer localhost:5999 2>/dev/null || (echo Installing vncviewer...; sudo apt-get install -y tigervnc-viewer && vncviewer localhost:5999); exec bash"'
      Icon=preferences-desktop-remote-desktop
      Terminal=false
      DESK

      cat > /home/azureuser/Desktop/OpenClaw-Logs.desktop << 'DESK'
      [Desktop Entry]
      Type=Application
      Name=OpenClaw Logs
      Exec=xfce4-terminal -e 'bash -c "sudo journalctl -u openclaw-gateway -f; exec bash"'
      Icon=utilities-log-viewer
      Terminal=false
      DESK

      chmod +x /home/azureuser/Desktop/*.desktop
      chown -R azureuser:azureuser /home/azureuser/Desktop

      # Mark desktop files as trusted for XFCE
      su - azureuser -c "
          for f in ~/Desktop/*.desktop; do
              gio set \"\$f\" metadata::trusted true 2>/dev/null || true
              gio set \"\$f\" metadata::xfce-exe-checksum \"\$(sha256sum \"\$f\" | cut -d' ' -f1)\" 2>/dev/null || true
          done
      " || true

      # Set Google Chrome as the default web browser
      su - azureuser -c "
          xdg-settings set default-web-browser google-chrome.desktop 2>/dev/null || true
          xdg-mime default google-chrome.desktop x-scheme-handler/http 2>/dev/null || true
          xdg-mime default google-chrome.desktop x-scheme-handler/https 2>/dev/null || true
          xdg-mime default google-chrome.desktop text/html 2>/dev/null || true
      " || true

      # ---------------------------------------------------------------
      # Start services
      # ---------------------------------------------------------------
      echo "Starting services..."
      systemctl daemon-reload
      systemctl enable xvfb.service
      systemctl start xvfb.service
      systemctl enable x11vnc-xvfb.service
      systemctl start x11vnc-xvfb.service
      systemctl enable openclaw-gateway.service
      systemctl start openclaw-gateway.service

      # ---------------------------------------------------------------
      # Post-start validation
      # ---------------------------------------------------------------
      sleep 5
      echo "Running OpenClaw doctor..."
      su - azureuser -c "DISPLAY=:99 openclaw doctor --fix" 2>/dev/null || true

      # doctor --fix has a known issue where it adds gateway.auth even for
      # loopback gateways. Strip it back out if that happened.
      su - azureuser -c "openclaw config unset gateway.auth" 2>/dev/null || true

      # Belt-and-suspenders: set exec approvals via CLI in case the JSON
      # file format doesn't match the current version's schema
      echo "Configuring exec approvals via CLI..."
      su - azureuser -c 'openclaw approvals allowlist add --agent "*" "**"' 2>/dev/null || true
      su - azureuser -c 'openclaw approvals allowlist add --agent "main" "**"' 2>/dev/null || true

      echo "=== OpenClaw Setup Complete ==="
      echo "Data disk mounted at /data"
      echo "OpenClaw data: /data/openclaw -> ~/.openclaw"
      echo "Workspace:     /data/workspace -> ~/workspace"

runcmd:
  - bash /opt/setup-openclaw.sh
