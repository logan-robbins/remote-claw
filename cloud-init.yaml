#cloud-config
# Azure Ubuntu 24.04 VM with a persistent xfce4 desktop on :0, exposed via x11vnc,
# preinstalled with OpenClaw + Google Chrome + Telegram Desktop, and auto-starting
# an OpenClaw gateway bound to Telegram at boot.
#
# Secrets (XAI/OpenAI/BrightData/Telegram tokens and SOUL.md base64 body) are
# substituted via envsubst BEFORE `az vm create` runs. See deploy.sh for the
# substitution logic. cloud-init.yaml itself never contains secrets -- it
# contains ${VAR} placeholders only.
#
# Based on the shape of the Microsoft tutorial
#   https://learn.microsoft.com/en-us/azure/virtual-machines/linux/use-remote-desktop
# and on OpenClaw's 2026 docs
#   https://docs.openclaw.ai/tools/browser-linux-troubleshooting
#
# Do NOT add a `users:` block -- that replaces the default Azure admin user
# (azureuser) and breaks SSH key injection.

package_update: true
package_upgrade: true

packages:
  # Desktop + remote access
  - xfce4
  - xfce4-session
  - xfce4-goodies
  - lightdm
  - x11vnc
  - xserver-xorg-video-dummy
  # GUI automation tools (xdotool, wmctrl, scrot, xclip, x11-utils)
  - xdotool
  - wmctrl
  - scrot
  - xclip
  - x11-utils
  # Terminal multiplexer (used by Claude Code remote-control)
  - tmux
  # Fetch/build helpers used by the Phase 2 install step
  - curl
  - wget
  - ca-certificates
  - gnupg
  - jq
  - git
  - build-essential

write_files:
  # ---- lightdm auto-login into an xfce session on :0 --------------------------
  - path: /etc/lightdm/lightdm.conf.d/50-autologin.conf
    permissions: "0644"
    content: |
      [Seat:*]
      autologin-user=azureuser
      autologin-user-timeout=0
      user-session=xfce

  # ---- x11vnc service attached to :0 ------------------------------------------
  - path: /etc/systemd/system/x11vnc.service
    permissions: "0644"
    content: |
      [Unit]
      Description=x11vnc server attached to the lightdm autologin :0 session (view-only)
      After=lightdm.service
      Wants=lightdm.service

      [Service]
      Type=simple
      ExecStartPre=/bin/bash -c 'until [ -S /tmp/.X11-unix/X0 ]; do sleep 1; done'
      ExecStart=/usr/bin/x11vnc \
          -display :0 \
          -auth guess \
          -rfbport 5900 \
          -rfbauth /etc/x11vnc.pass \
          -forever \
          -shared \
          -viewonly \
          -noxdamage \
          -o /var/log/x11vnc.log
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

  # ---- Dummy Xorg config (stable headless desktop on Azure) -------------------
  - path: /etc/X11/xorg.conf.d/99-dummy.conf
    permissions: "0644"
    content: |
      Section "Device"
          Identifier "dummy_vga"
          Driver "dummy"
          VideoRam 256000
      EndSection
      Section "Screen"
          Identifier "dummy_screen"
          Device "dummy_vga"
          Monitor "dummy_monitor"
          DefaultDepth 24
          SubSection "Display"
              Depth 24
              Modes "1920x1080" "1280x1024" "1024x768"
          EndSubSection
      EndSection
      Section "Monitor"
          Identifier "dummy_monitor"
          HorizSync   1-200
          VertRefresh 1-200
      EndSection

  # ---- Disable xfce screen blanking/DPMS (prevents light-locker trap) ---------
  - path: /etc/xdg/autostart/disable-blanking.desktop
    permissions: "0644"
    content: |
      [Desktop Entry]
      Type=Application
      Name=Disable screen blanking and DPMS
      Comment=Keep the :0 session awake forever so VNC viewers always see live content
      Exec=bash -c "xset s off s noblank -dpms"
      OnlyShowIn=XFCE;
      X-GNOME-Autostart-enabled=true
      NoDisplay=true

  # ---- Secrets env file for OpenClaw gateway ----------------------------------
  # Values below come from ${VAR} substitution in deploy.sh (envsubst over .env).
  # The file is azureuser-owned and 0600-perms so nothing else can read it.
  - path: /home/azureuser/.env
    # ownership set by runcmd chown after user creation
    permissions: "0600"
    content: |
      OPENCLAW_MODEL=${OPENCLAW_MODEL}
      XAI_API_KEY=${XAI_API_KEY}
      OPENAI_API_KEY=${OPENAI_API_KEY}
      ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      BRIGHTDATA_API_TOKEN=${BRIGHTDATA_API_TOKEN}
      TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      TELEGRAM_USER_ID=${TELEGRAM_USER_ID}

  # ---- OpenClaw config --------------------------------------------------------
  # ${TELEGRAM_DM_POLICY} and ${TELEGRAM_ALLOW_FROM} are computed by deploy.sh
  # based on whether TELEGRAM_USER_ID is set. See deploy.sh for the derivation.
  - path: /home/azureuser/.openclaw/openclaw.json
    # ownership set by runcmd chown after user creation
    permissions: "0644"
    content: |
      {
        "agents": {
          "defaults": {
            "model": {
              "primary": "xai/grok-4.20-0309-reasoning",
              "fallbacks": ["xai/grok-4"]
            },
            "workspace": "/home/azureuser/workspace",
            "maxConcurrent": 4,
            "sandbox": {
              "mode": "off"
            },
            "elevatedDefault": "full",
            "thinkingDefault": "max",
            "subagents": {
              "model": "xai/grok-4.20-0309-reasoning",
              "maxConcurrent": 4,
              "maxSpawnDepth": 5,
              "maxChildrenPerAgent": 20
            }
          },
          "list": [
            {
              "id": "main",
              "default": true
            }
          ]
        },

        "models": {
          "mode": "merge",
          "providers": {
            "xai": {
              "baseUrl": "https://api.x.ai/v1",
              "api": "openai-completions",
              "models": [
                {
                  "id": "grok-4.20-0309-reasoning",
                  "name": "Grok 4 Reasoning",
                  "reasoning": true,
                  "input": ["text"],
                  "contextWindow": 200000,
                  "maxTokens": 32768
                },
                {
                  "id": "grok-4",
                  "name": "Grok 4",
                  "reasoning": false,
                  "input": ["text"],
                  "contextWindow": 200000,
                  "maxTokens": 8192
                }
              ]
            }
          }
        },

        "channels": {
          "telegram": {
            "enabled": true,
            "dmPolicy": "${TELEGRAM_DM_POLICY}",
            "allowFrom": [${TELEGRAM_ALLOW_FROM}],
            "groupPolicy": "disabled",
            "streaming": "partial"
          }
        },

        "gateway": {
          "port": 18789,
          "mode": "local",
          "bind": "loopback"
        },

        "tools": {
          "exec": {
            "security": "full",
            "ask": "off",
            "backgroundMs": 10000,
            "timeoutSec": 1800
          },
          "web": {
            "search": { "enabled": true },
            "fetch": { "enabled": true }
          }
        },

        "browser": {
          "enabled": true,
          "executablePath": "/usr/bin/google-chrome-stable",
          "headless": false,
          "noSandbox": true
        },

        "logging": {
          "redactSensitive": "tools"
        }
      }

  # ---- OpenClaw exec approvals (full autonomy for the dev agent) --------------
  - path: /home/azureuser/.openclaw/exec-approvals.json
    # ownership set by runcmd chown after user creation
    permissions: "0644"
    content: |
      {
        "version": 1,
        "defaults": {
          "security": "full",
          "ask": "off",
          "askFallback": "full"
        },
        "agents": {
          "main": {
            "security": "full",
            "ask": "off",
            "askFallback": "full",
            "allowlist": [
              { "pattern": "**" }
            ]
          }
        }
      }

  # ---- SOUL.md (agent identity) -----------------------------------------------
  # Base64-encoded at deploy time from the user's local SOUL.md (if present)
  # or from a minimal placeholder (if absent). See deploy.sh.
  - path: /home/azureuser/.openclaw/SOUL.md
    # ownership set by runcmd chown after user creation
    permissions: "0644"
    encoding: base64
    content: ${SOUL_MD_BASE64}

  # ---- OpenClaw gateway systemd unit ------------------------------------------
  # Runs as azureuser, on display :0, reading secrets from ~/.env, and depends
  # on x11vnc (which depends on lightdm) so it only fires after the desktop
  # session is fully up.
  - path: /etc/systemd/system/openclaw-gateway.service
    permissions: "0644"
    content: |
      [Unit]
      Description=OpenClaw Gateway (auto-starts at boot, binds to Telegram)
      After=network-online.target lightdm.service x11vnc.service
      Wants=network-online.target lightdm.service x11vnc.service
      ConditionPathExists=/home/azureuser/.openclaw/openclaw.json
      ConditionPathExists=/home/azureuser/.env

      [Service]
      Type=simple
      User=azureuser
      Group=azureuser
      WorkingDirectory=/home/azureuser
      Environment=HOME=/home/azureuser
      Environment=DISPLAY=:0
      Environment=XAUTHORITY=/home/azureuser/.Xauthority
      Environment=NODE_COMPILE_CACHE=/var/tmp/openclaw-compile-cache
      Environment=OPENCLAW_NO_RESPAWN=1
      EnvironmentFile=/home/azureuser/.env
      ExecStartPre=/bin/bash -c 'until [ -S /tmp/.X11-unix/X0 ]; do sleep 1; done'
      ExecStart=/usr/bin/openclaw gateway
      Restart=always
      RestartSec=10
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target

runcmd:
  # ---- Host-side firewall fully disabled --------------------------------------
  - systemctl stop ufw || true
  - systemctl disable ufw || true
  - ufw --force disable || true

  # ---- Purge light-locker (the 10-min screen lock trap) -----------------------
  - DEBIAN_FRONTEND=noninteractive apt-get purge -y light-locker light-locker-settings 2>&1 || true

  # ---- Fix home directory ownership -------------------------------------------
  # cloud-init's write_files runs BEFORE users_groups (module ordering in Ubuntu
  # 24.04's cloud_init_modules). When write_files creates files under
  # /home/azureuser/, it also creates the parent directory as root because the
  # user doesn't exist yet. The Azure provisioner later creates azureuser but
  # doesn't re-chown the pre-existing home dir. Without this fix, the xfce
  # session crashes on first autologin because it can't write .ICEauthority,
  # .Xauthority, or .config/ to a root-owned home dir.
  - chown azureuser:azureuser /home/azureuser

  # ---- Full unrestricted sudo for the agent (literal 100% control) -----------
  - |
    echo "azureuser ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/azureuser-full
    chmod 440 /etc/sudoers.d/azureuser-full

  # ---- xfce session hint ------------------------------------------------------
  - sudo -u azureuser bash -c 'echo xfce4-session > ~/.xsession && chmod 644 ~/.xsession'

  # ---- VNC password ----------------------------------------------------------
  - |
    VNC_PASS=$(tr -dc 'A-Za-z0-9' </dev/urandom | head -c 16)
    echo "$VNC_PASS" > /home/azureuser/vnc-password.txt
    chown azureuser:azureuser /home/azureuser/vnc-password.txt
    chmod 600 /home/azureuser/vnc-password.txt
    x11vnc -storepasswd "$VNC_PASS" /etc/x11vnc.pass
    chmod 600 /etc/x11vnc.pass

  # ---- Node.js 24 + OpenClaw --------------------------------------------------
  # The system nodejs 18.x may get pulled in as a dependency (node-acorn ->
  # libnode109 chain). Purge it first so the nodesource 24.x install takes hold
  # and provides npm.
  - |
    apt-get remove --purge -y nodejs libnode-dev 2>/dev/null || true
    curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
    DEBIAN_FRONTEND=noninteractive apt-get install -y nodejs
    npm install -g openclaw@latest

  # ---- Tailscale (remote gateway access via Serve/Funnel) ---------------------
  - |
    curl -fsSL https://tailscale.com/install.sh | sh

  # ---- Google Chrome .deb (per 2026 OpenClaw Linux troubleshooting docs) ------
  # snap Chromium is explicitly broken for OpenClaw's CDP integration because
  # of snap AppArmor confinement. The .deb is the recommended path.
  - wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb -O /tmp/chrome.deb
  - DEBIAN_FRONTEND=noninteractive apt-get install -y /tmp/chrome.deb
  - rm /tmp/chrome.deb

  # ---- Claude Code CLI ---------------------------------------------------------
  - npm install -g @anthropic-ai/claude-code

  # ---- Node compile cache (openclaw doctor recommendation) --------------------
  - mkdir -p /var/tmp/openclaw-compile-cache

  # ---- /opt/claw directory (boot scripts staged here by deploy.sh via SCP) ----
  - mkdir -p /opt/claw/defaults /opt/claw/updates

  # ---- Directory ownership for azureuser --------------------------------------
  - mkdir -p /home/azureuser/workspace /home/azureuser/.openclaw
  - chown -R azureuser:azureuser /home/azureuser

  # ---- Enable graphical target + lightdm --------------------------------------
  - systemctl set-default graphical.target
  - systemctl enable lightdm
  - systemctl start lightdm

  # ---- x11vnc service attached to :0 ------------------------------------------
  - systemctl daemon-reload
  - systemctl enable --now x11vnc

  # ---- OpenClaw gateway (auto-starts at every boot) ---------------------------
  - systemctl enable --now openclaw-gateway
