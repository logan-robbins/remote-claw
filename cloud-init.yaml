#cloud-config

# OpenClaw Runtime cloud-init (small, runs per-deploy)
# -----------------------------------------------------------------------------
# Runs on every VM deploy. Assumes the specialized image has all software
# pre-installed via cloud-init-bake.yaml. This file only handles:
#   - Setting the RDP password
#   - Writing secrets + config templates into /etc/openclaw-runtime/
#   - Running /opt/first-boot.sh (baked into image) which mounts the data
#     disk, seeds config from templates, and starts services.
#
# Template placeholders replaced by deploy.sh:
#   __XAI_API_KEY__           xAI API key
#   __TELEGRAM_BOT_TOKEN__    Telegram bot token
#   __TELEGRAM_DM_POLICY__    "allowlist" or "open"
#   __TELEGRAM_ALLOW_FROM__   JSON inner value: "123456789" or "*"
#   __RDP_PASSWORD__          Random RDP password (printed at end of deploy)
# -----------------------------------------------------------------------------

ssh_pwauth: true

write_files:
  # Env file template (copied into /data/openclaw/.env on first-boot)
  - path: /etc/openclaw-runtime/env.template
    permissions: "0600"
    content: |
      XAI_API_KEY=__XAI_API_KEY__
      TELEGRAM_BOT_TOKEN=__TELEGRAM_BOT_TOKEN__

  # openclaw.json template (copied into /data/openclaw/openclaw.json on first-boot)
  - path: /etc/openclaw-runtime/openclaw.json.template
    permissions: "0644"
    content: |
      {
        // --- Agent defaults ---
        "agents": {
          "defaults": {
            "model": {
              "primary": "xai/grok-4"
            },
            "workspace": "/home/azureuser/workspace",
            "maxConcurrent": 4,
            "sandbox": {
              "mode": "off"
            },
            "elevatedDefault": "full"
          },
          "list": [
            {
              "id": "main",
              "default": true
            }
          ]
        },

        // --- Model provider ---
        "models": {
          "mode": "merge",
          "providers": {
            "xai": {
              "baseUrl": "https://api.x.ai/v1",
              "api": "openai-completions",
              "models": [
                {
                  "id": "grok-4",
                  "name": "Grok 4",
                  "reasoning": false,
                  "input": ["text"],
                  "contextWindow": 200000,
                  "maxTokens": 8192
                }
              ]
            }
          }
        },

        // --- Channels ---
        "channels": {
          "telegram": {
            "enabled": true,
            "dmPolicy": "__TELEGRAM_DM_POLICY__",
            "allowFrom": [__TELEGRAM_ALLOW_FROM__],
            "groupPolicy": "disabled",
            "streaming": "partial"
          }
        },

        // --- Gateway ---
        "gateway": {
          "port": 18789,
          "mode": "local",
          "bind": "loopback"
        },

        // --- Tools: full autonomy ---
        "tools": {
          "exec": {
            "security": "full",
            "ask": "off",
            "backgroundMs": 10000,
            "timeoutSec": 1800
          },
          "web": {
            "search": { "enabled": true },
            "fetch": { "enabled": true }
          }
        },

        // --- Browser: headed on Xvfb :99 ---
        "browser": {
          "enabled": true,
          "executablePath": "/usr/bin/google-chrome-stable",
          "headless": false,
          "noSandbox": true
        },

        // --- Logging ---
        "logging": {
          "redactSensitive": "tools"
        }
      }

  # Exec approvals template (copied into /data/openclaw/exec-approvals.json on first-boot)
  - path: /etc/openclaw-runtime/exec-approvals.json.template
    permissions: "0644"
    content: |
      {
        "version": 1,
        "defaults": {
          "security": "full",
          "ask": "off",
          "askFallback": "full"
        },
        "agents": {
          "*": {
            "security": "full",
            "ask": "off",
            "askFallback": "full",
            "allowlist": [
              { "pattern": "**" }
            ]
          },
          "main": {
            "security": "full",
            "ask": "off",
            "askFallback": "full",
            "allowlist": [
              { "pattern": "**" }
            ]
          }
        }
      }

runcmd:
  # Set RDP password for azureuser (rotated per deploy)
  - echo 'azureuser:__RDP_PASSWORD__' | chpasswd
  # Run first-boot (baked into image at /opt/first-boot.sh)
  - /opt/first-boot.sh
